<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PolyU MSc IRE - Embodied Robot Intelligence Demo</title>
    <style>
        body { margin:0; background:#191925; color:#fff; font-family:"Microsoft YaHei",sans-serif; text-align:center; overflow-x:hidden; }
        canvas { display:block; margin:10px auto; border:4px solid #4a90e2; border-radius:12px; background:#111; max-width:100%; height:auto; }
        .info { position:absolute; top:15px; left:15px; right:15px; background:rgba(0,0,0,0.85); padding:12px; border-radius:12px; line-height:1.6; font-size:15px; }
        button { padding:18px 40px; font-size:22px; margin:15px auto; background:#4a90e2; color:white; border:none; border-radius:12px; cursor:pointer; width:90%; max-width:400px; display:block; }
        h1 { margin:15px 0 5px; font-size:1.4em; }
        h3 { color:#4a90e2; margin:0; }
    </style>
</head>
<body>
    <h1>PolyU MSc IRE</h1>
    <h3>Week 1 • Embodied Robot Intelligence Demo</h3>

    <canvas id="game" width="900" height="600"></canvas>

    <div class="info">
        <div id="perception">👁️ Perception 感知: Waiting...</div>
        <div id="think">🤖 LLM Think 思考: Waiting...</div>
        <div id="action">⚡ Action 動作: Waiting...</div>
        <div id="position" style="margin-top:8px; color:#aaa; font-size:14px;">📍 Position: (150, 300)</div>
    </div>

    <button onclick="runCycle()">🚀 執行一次完整循環<br><small>Perception → LLM Think → Action</small></button>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
let agent = { x: 150, y: 300 };
let lastPerception = "Waiting...";
let lastThink = "Waiting...";
let lastAction = "Waiting...";

const obstacle = { x: 400, y: 220, w: 80, h: 80 };
const target = { x: 650, y: 320, w: 60, h: 60 };

function perceive() {
    const vision = ["clear", "red cube", "obstacle ahead"][Math.floor(Math.random()*3)];
    const touch = ["clear", "obstacle", "object"][Math.floor(Math.random()*3)];
    lastPerception = `Vision: ${vision} | Touch: ${touch}`;
    return { vision, touch };
}

function llmThink(sensors) {
    if (sensors.touch === "obstacle") return { action: "move", dx: -90, dy: 0, reason: "避開障礙" };
    else if (sensors.touch === "object") return { action: "close", force: 60, reason: "夾取目標" };
    else return { action: "move", dx: 110, dy: 0, reason: "前進" };
}

function execute(cmd) {
    if (cmd.action === "move") {
        agent.x += cmd.dx;
        agent.y += cmd.dy;
        if (agent.x < 50) agent.x = 50;
        if (agent.x > 850) agent.x = 850;
    }
    lastAction = `${cmd.action.toUpperCase()} | ${cmd.reason}`;
}

function runCycle() {
    const sensors = perceive();
    const cmd = llmThink(sensors);
    lastThink = `LLM Think: ${cmd.reason}`;
    execute(cmd);
    
    document.getElementById("perception").innerText = `👁️ Perception 感知: ${lastPerception}`;
    document.getElementById("think").innerText = `🤖 LLM Think 思考: ${lastThink}`;
    document.getElementById("action").innerText = `⚡ Action 動作: ${lastAction}`;
    document.getElementById("position").innerText = `📍 Position: (${Math.round(agent.x)}, ${Math.round(agent.y)})`;
}

function draw() {
    ctx.fillStyle = "#191925";
    ctx.fillRect(0, 0, 900, 600);
    
    // Grid
    ctx.strokeStyle = "#222";
    for(let i=0; i<900; i+=30) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,600); ctx.stroke(); }
    for(let i=0; i<600; i+=30) { ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(900,i); ctx.stroke(); }

    // Obstacle
    ctx.fillStyle = "#e74c3c";
    ctx.fillRect(obstacle.x, obstacle.y, obstacle.w, obstacle.h);
    ctx.strokeStyle = "#ff6";
    ctx.lineWidth = 2;
    ctx.strokeRect(obstacle.x, obstacle.y, obstacle.w, obstacle.h);
    
    // Target
    ctx.fillStyle = "#2ecc71";
    ctx.fillRect(target.x, target.y, target.w, target.h);
    ctx.strokeStyle = "#6f6";
    ctx.strokeRect(target.x, target.y, target.w, target.h);
    
    // Agent
    ctx.fillStyle = "#3498db";
    ctx.beginPath();
    ctx.arc(agent.x, agent.y, 35, 0, Math.PI*2);
    ctx.fill();
    ctx.strokeStyle = "#6cf";
    ctx.lineWidth = 3;
    ctx.stroke();
    
    requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
