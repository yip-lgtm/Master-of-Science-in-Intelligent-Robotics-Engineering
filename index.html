<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PolyU MSc IRE Week 1 - Embodied Agent 2D Game</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1c26;
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            color: #fff;
        }
        h1 {
            margin: 20px 0 10px;
            font-size: 28px;
            color: #fff;
        }
        .subtitle {
            color: #888;
            margin-bottom: 20px;
            font-size: 14px;
        }
        canvas {
            border: 3px solid #334;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        .panel {
            display: flex;
            gap: 20px;
            margin: 20px 0;
            width: 900px;
            justify-content: space-between;
        }
        .info-box {
            background: #252836;
            padding: 15px 20px;
            border-radius: 8px;
            width: 280px;
        }
        .info-box h3 {
            font-size: 16px;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 1px solid #334;
        }
        .perception { color: #ff6; }
        .think { color: #6cf; }
        .action { color: #6f6; }
        .task-box {
            background: #252836;
            padding: 15px 20px;
            border-radius: 8px;
            width: 900px;
            margin-top: 10px;
            text-align: center;
        }
        .task {
            font-size: 18px;
            color: #ccc;
        }
        .instructions {
            color: #666;
            font-size: 14px;
            margin-top: 15px;
        }
        .legend {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin: 15px 0;
            color: #555;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <h1>PolyU MSc IRE - Embodied Robot Intelligence Demo</h1>
    <div class="subtitle">Week 1 | Embodied Robot Intelligence</div>
    
    <canvas id="game" width="900" height="500"></canvas>
    
    <div class="panel">
        <div class="info-box">
            <h3>🔍 Perception 感知</h3>
            <div id="perception" class="perception">Waiting...<br>等待按 SPACE</div>
        </div>
        <div class="info-box">
            <h3>🧠 LLM Think 思考</h3>
            <div id="think" class="think">Waiting...<br>等待按 SPACE</div>
        </div>
        <div class="info-box">
            <h3>⚡ Action 動作</h3>
            <div id="action" class="action">Waiting...<br>等待按 SPACE</div>
        </div>
    </div>
    
    <div class="task-box">
        <div class="task">🎯 任務: pick up the green cube / 夾取綠色方塊</div>
        <div class="instructions">按 SPACE 鍵執行一次 Perceive → Think → Action 循環</div>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        
        // Game state (random version)
        const agent = { x: 150, y: 300 };
        const task = "pick up the green cube";
        
        // UI elements
        const perceptionEl = document.getElementById('perception');
        const thinkEl = document.getElementById('think');
        const actionEl = document.getElementById('action');
        
        // Perceive function (RANDOM like user's Python code)
        function perceive() {
            const vision = ["clear", "red cube", "obstacle ahead"][Math.floor(Math.random() * 3)];
            const touch = ["clear", "obstacle", "object"][Math.floor(Math.random() * 3)];
            return { vision, touch };
        }
        
        // LLM Think function
        function llmThink(sensors, task) {
            if (sensors.touch === "obstacle") {
                return {action: "move", dx: -90, dy: 0, reason: "避開障礙"};
            } else if (sensors.touch === "object" && task.includes("pick")) {
                return {action: "close", dx: 0, dy: 0, reason: "夾取目標", force: 60};
            } else {
                return {action: "move", dx: 110, dy: 0, reason: "前進"};
            }
        }
        
        // Execute function
        function execute(command) {
            agent.x += command.dx;
            agent.y += command.dy;
            // Boundary
            agent.x = Math.max(30, Math.min(canvas.width - 30, agent.x));
            agent.y = Math.max(50, Math.min(canvas.height - 50, agent.y));
            return command;
        }
        
        // Draw function
        function draw() {
            ctx.fillStyle = '#1a1c26';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Grid
            ctx.strokeStyle = '#252836';
            for (let i = 0; i < canvas.width; i += 30) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
            }
            for (let i = 0; i < canvas.height; i += 30) {
                ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
            }
            
            // Obstacle (red)
            ctx.fillStyle = '#dc3c3c';
            ctx.fillRect(400, 220, 80, 80);
            ctx.strokeStyle = '#ff5555';
            ctx.lineWidth = 2;
            ctx.strokeRect(400, 220, 80, 80);
            
            // Target (green)
            ctx.fillStyle = '#32dc3c';
            ctx.fillRect(650, 320, 60, 60);
            ctx.strokeStyle = '#55ff55';
            ctx.strokeRect(650, 320, 60, 60);
            
            // Agent (blue circle)
            ctx.beginPath();
            ctx.arc(agent.x, agent.y, 35, 0, Math.PI * 2);
            ctx.fillStyle = '#50b4ff';
            ctx.fill();
            ctx.strokeStyle = '#88ccff';
            ctx.lineWidth = 3;
            ctx.stroke();
        }
        
        function update() {
            requestAnimationFrame(draw);
        }
        
        // Input handler - SPACE key
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                
                // Perceive
                const sensors = perceive();
                perceptionEl.innerHTML = `Vision: ${sensors.vision}<br>Touch: ${sensors.touch}`;
                
                // Think
                const command = llmThink(sensors, task);
                thinkEl.innerHTML = `LLM Think:<br>${command.reason}`;
                
                // Act
                const result = execute(command);
                actionEl.innerHTML = `Action: ${result.action}<br>${result.reason || ''}`;
            }
        });
        
        // Start game loop
        update();
    </script>
</body>
</html>
